name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 1.0.0)"
        required: false
        type: string

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: arm64
            artifact_label: apple-silicon
            runner: macos-14
          - architecture: x86_64
            artifact_label: intel
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Select Xcode 16+
        run: |
          set -euo pipefail

          best_app=""
          best_version=""

          for app in /Applications/Xcode*.app; do
            [[ -d "$app" ]] || continue
            version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app/Contents/Info.plist")"
            major="${version%%.*}"

            if (( major < 16 )); then
              continue
            fi

            if [[ -z "$best_version" ]] || [[ "$(printf '%s\n%s\n' "$best_version" "$version" | sort -V | tail -n1)" == "$version" ]]; then
              best_version="$version"
              best_app="$app"
            fi
          done

          if [[ -z "$best_app" ]]; then
            echo "No Xcode 16+ installation found on this runner." >&2
            exit 1
          fi

          echo "DEVELOPER_DIR=$best_app/Contents/Developer" >> "$GITHUB_ENV"
          echo "Selected Xcode $best_version at $best_app"

      - name: Resolve release version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${INPUT_VERSION}" ]]; then
            VERSION="${INPUT_VERSION}"
          else
            VERSION="0.1.0-dev.${GITHUB_RUN_NUMBER}"
          fi

          echo "APP_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "APP_BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Install bundled Kokoro runtime dependencies
        run: ./scripts/install_kokoro.sh

      - name: Build release artifacts
        run: ./scripts/package_release.sh "$APP_VERSION" "$APP_BUILD_NUMBER" "${{ matrix.architecture }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: AudioLocal-macOS-${{ matrix.artifact_label }}-${{ env.APP_VERSION }}
          path: |
            dist/AudioLocal-macOS-${{ matrix.artifact_label }}-${{ env.APP_VERSION }}.zip
            dist/AudioLocal-macOS-${{ matrix.artifact_label }}-${{ env.APP_VERSION }}.zip.sha256
            dist/AudioLocal-macOS-${{ matrix.artifact_label }}-${{ env.APP_VERSION }}.dmg
            dist/AudioLocal-macOS-${{ matrix.artifact_label }}-${{ env.APP_VERSION }}.dmg.sha256

  build-release-windows:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve release version
        shell: pwsh
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $version = $env:GITHUB_REF_NAME.Substring(1)
          } elseif (-not [string]::IsNullOrWhiteSpace($env:INPUT_VERSION)) {
            $version = $env:INPUT_VERSION
          } else {
            $version = "0.1.0-dev.$env:GITHUB_RUN_NUMBER"
          }

          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_BUILD_NUMBER=$env:GITHUB_RUN_NUMBER" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install ffmpeg
        shell: pwsh
        run: choco install ffmpeg -y --no-progress

      - name: Build bundled Kokoro runtimes
        shell: pwsh
        run: |
          $runtimeRoot = Join-Path $env:RUNNER_TEMP 'AudioLocalRuntimes'
          ./Windows/scripts/install_kokoro_runtimes.ps1 -OutputRoot $runtimeRoot
          "WINDOWS_RUNTIME_ROOT=$runtimeRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Resolve ffmpeg path
        shell: pwsh
        run: |
          $ffmpegPath = Get-ChildItem -Path 'C:\ProgramData\chocolatey\lib' -Recurse -Filter ffmpeg.exe |
            Where-Object { $_.FullName -match '\\bin\\ffmpeg\.exe$' } |
            Select-Object -First 1 -ExpandProperty FullName

          if ([string]::IsNullOrWhiteSpace($ffmpegPath)) {
            throw 'Could not locate ffmpeg.exe after installation.'
          }

          "WINDOWS_FFMPEG_PATH=$ffmpegPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows release artifacts
        shell: pwsh
        run: |
          ./Windows/scripts/package_release.ps1 `
            -Version "${{ env.APP_VERSION }}" `
            -BuildNumber "${{ env.APP_BUILD_NUMBER }}" `
            -Architecture x64 `
            -BundledRuntimeRoot "${{ env.WINDOWS_RUNTIME_ROOT }}" `
            -BundledFfmpegPath "${{ env.WINDOWS_FFMPEG_PATH }}"

      - name: Upload Windows workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: AudioLocal-Windows-x64-${{ env.APP_VERSION }}
          path: |
            dist/AudioLocal-Windows-x64-${{ env.APP_VERSION }}.zip
            dist/AudioLocal-Windows-x64-${{ env.APP_VERSION }}.zip.sha256
            dist/AudioLocal-Windows-x64-${{ env.APP_VERSION }}.msi
            dist/AudioLocal-Windows-x64-${{ env.APP_VERSION }}.msi.sha256

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build-release
      - build-release-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-artifacts
          pattern: AudioLocal-*
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.zip
            release-artifacts/*.zip.sha256
            release-artifacts/*.dmg
            release-artifacts/*.dmg.sha256
            release-artifacts/*.msi
            release-artifacts/*.msi.sha256
