name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Select Xcode 16+
        run: |
          set -euo pipefail

          best_app=""
          best_version=""

          for app in /Applications/Xcode*.app; do
            [[ -d "$app" ]] || continue
            version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$app/Contents/Info.plist")"
            major="${version%%.*}"

            if (( major < 16 )); then
              continue
            fi

            if [[ -z "$best_version" ]] || [[ "$(printf '%s\n%s\n' "$best_version" "$version" | sort -V | tail -n1)" == "$version" ]]; then
              best_version="$version"
              best_app="$app"
            fi
          done

          if [[ -z "$best_app" ]]; then
            echo "No Xcode 16+ installation found on this runner." >&2
            exit 1
          fi

          echo "DEVELOPER_DIR=$best_app/Contents/Developer" >> "$GITHUB_ENV"
          echo "Selected Xcode $best_version at $best_app"

      - name: Build Swift package
        run: swift build

      - name: Build app bundle
        run: INCLUDE_BUNDLED_KOKORO=0 INCLUDE_BUNDLED_VOXTRAL=0 ./scripts/build_app_bundle.sh 0.0.0-ci "${{ github.run_number }}" arm64

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build Windows solution
        shell: pwsh
        run: dotnet build .\Windows\AudioLocal.Windows.slnx -p:UseSharedCompilation=false

      - name: Run Windows tests
        shell: pwsh
        run: dotnet test .\Windows\tests\AudioLocal.Windows.Core.Tests\AudioLocal.Windows.Core.Tests.csproj --no-build
