name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 1.0.0)"
        required: false
        type: string

jobs:
  build-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: arm64
            artifact_label: apple-silicon
            runner: macos-14
          - architecture: x86_64
            artifact_label: intel
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [[ -n "${INPUT_VERSION}" ]]; then
            VERSION="${INPUT_VERSION}"
          else
            VERSION="0.1.0-dev.${GITHUB_RUN_NUMBER}"
          fi

          echo "APP_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "APP_BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Build release artifacts
        run: ./scripts/package_release.sh "$APP_VERSION" "$APP_BUILD_NUMBER" "${{ matrix.architecture }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AudioLocal-macOS-${{ matrix.artifact_label }}-${{ env.APP_VERSION }}
          path: |
            dist/AudioLocal-macOS-${{ matrix.artifact_label }}-${{ env.APP_VERSION }}.zip
            dist/AudioLocal-macOS-${{ matrix.artifact_label }}-${{ env.APP_VERSION }}.zip.sha256
            dist/AudioLocal-macOS-${{ matrix.artifact_label }}-${{ env.APP_VERSION }}.dmg
            dist/AudioLocal-macOS-${{ matrix.artifact_label }}-${{ env.APP_VERSION }}.dmg.sha256

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: AudioLocal-macOS-*
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.zip
            release-artifacts/*.zip.sha256
            release-artifacts/*.dmg
            release-artifacts/*.dmg.sha256
