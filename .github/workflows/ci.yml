name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Swift package
        run: swift build

      - name: Build app bundle
        run: ./scripts/build_app_bundle.sh 0.0.0-ci "${{ github.run_number }}" arm64
